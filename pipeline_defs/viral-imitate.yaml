name: viral-imitate
version: "2.0"
description: "爆款跟拍（七Agent版）：拆解 -> 文案 -> 评审+闸门① -> 分镜 -> 素材硬闸+关键帧闸门② -> 镜头级出片 -> 合成 -> 质检 -> 归档反馈"
default_budget_cny: 35.0
budget_mode: observe

defaults:
  max_retries: 2
  backoff: exp

stages:
  - name: analysis
    agent: analysis
    consumes: []
    produces: [analysis_report]
    tools: [doubao_analyze]
    skip_if_artifact_exists: analysis_report

  - name: script
    agent: script
    consumes: [analysis_report]
    produces: [script_copy]
    tools: [doubao_script]
    on_validation_fail: retry

  - name: script_review
    agent: review
    task_type: script_review
    consumes: [script_copy, analysis_report]
    produces: [review_report]
    tools: [doubao_review]
    on_review_fail: requeue_script

  - name: script_gate
    agent: review
    gate: human
    consumes: [script_copy, review_report]
    gate_ui_hint: "确认/微调文案；保存仅使受影响镜的分镜标记 stale"

  - name: storyboard
    agent: storyboard
    consumes: [script_copy]
    produces: [shot_plan]
    tools: [doubao_shotplan]
    on_validation_fail: retry

  - name: asset
    agent: asset
    consumes: [shot_plan]
    produces: [asset_manifest]
    tools: [hero_frame]
    hard_block_on_fail: true

  - name: hero_gate
    agent: asset
    gate: human
    gate_flag: HERO_FRAME_GATE
    consumes: [asset_manifest]
    gate_ui_hint: "逐镜确认构图；单镜重生成不触发出片"

  - name: production
    agent: media
    task_type: shot_gen
    fan_out: shot_plan.shots
    consumes: [shot_plan, asset_manifest]
    produces: [shot_report]
    tools: [seedance_shot]
    max_retries: 2
    budget_guard: true

  - name: compose
    agent: media
    task_type: compose
    consumes: [shot_report, script_copy]
    produces: [render_report]
    tools: [ffmpeg_compose]

  - name: final_qa
    agent: review
    task_type: final_qa
    consumes: [render_report, script_copy]
    produces: [qa_report]
    qa:
      - ffprobe_duration_within:
          tolerance_s: 1.5
      - has_audio_stream: true
      - resolution_matches_aspect: true

  - name: archive
    agent: review
    task_type: archive
    consumes: [qa_report, render_report]
    produces: [publish_archive]
