<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>七 Agent 闸门工作台</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260714-2" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>七 Agent 闸门工作台</h1>
        <p id="activeProject">未选择项目</p>
      </div>
      <div class="health" id="health">连接中</div>
    </header>

    <nav class="workflowNav" aria-label="制作流程">
      <a href="#projectSetup">创建</a>
      <a href="#productAssets">素材</a>
      <a href="#referenceIntake">采集</a>
      <a href="#projectQueue">项目</a>
      <a href="#scriptGate">脚本</a>
      <a href="#storyboardNode">分镜</a>
      <a href="#heroGate">关键帧</a>
      <a href="#productionNode">单镜</a>
      <a href="#composeNode">合成</a>
      <a href="#deliveryNode">交付</a>
    </nav>

    <main class="workspace">
      <section class="band" id="projectSetup">
        <div class="sectionHead">
          <h2>新建项目</h2>
          <span id="startState"></span>
        </div>
        <form class="startBar" id="startForm">
          <label>
            产品
            <select id="productSelect" name="product_id"></select>
          </label>
          <label>
            运行模式
            <select id="runtimeMode">
              <option value="mock">Mock</option>
              <option value="real">Real</option>
            </select>
          </label>
          <label>
            link_id
            <input id="linkInput" name="link_id" inputmode="numeric" placeholder="101" />
          </label>
          <button type="submit">开始生产</button>
        </form>
      </section>

      <section class="band" id="productAssets">
        <div class="sectionHead">
          <h2>产品素材库</h2>
          <div class="headActions">
            <span id="productLibraryState"></span>
            <button type="button" id="refreshProductLibrary">刷新素材库</button>
          </div>
        </div>
        <div id="productLibraryPanel" class="emptyState">等待产品素材库索引</div>
      </section>

      <section class="band" id="referenceIntake">
        <div class="sectionHead">
          <h2>TikTok 参考素材采集</h2>
          <span id="collectState"></span>
        </div>
        <form class="collectForm" id="collectForm">
          <label>
            采集方式
            <select id="collectMode">
              <option value="official">官方元数据</option>
              <option value="manual">人工导入</option>
            </select>
          </label>
          <label>
            来源关键词
            <input id="sourceKeywordInput" value="tiktok_oembed" />
          </label>
          <label class="collectLinks">
            TikTok 链接
            <textarea id="collectLinksInput" placeholder="每行一条 TikTok 链接"></textarea>
          </label>
          <button type="submit">导入素材</button>
        </form>
        <div id="materialLibrary" class="emptyState">暂无参考素材</div>
      </section>

      <section class="band" id="projectQueue">
        <div class="sectionHead">
          <h2>项目列表</h2>
          <button type="button" id="refreshButton">刷新</button>
        </div>
        <div class="tableWrap">
          <table class="projectTable">
            <thead>
              <tr>
                <th>项目号</th>
                <th>节点</th>
                <th>当前</th>
                <th>成本</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="projectRows"></tbody>
          </table>
        </div>
      </section>

      <section class="band gate" id="scriptGate">
        <div class="sectionHead">
          <h2>闸门① 脚本确认</h2>
          <span id="scriptGateState"></span>
        </div>
        <div id="scriptEditor" class="emptyState">等待脚本闸门项目</div>
      </section>

      <section class="band" id="storyboardNode">
        <div class="sectionHead">
          <h2>分镜节点</h2>
          <span id="storyboardNodeState"></span>
        </div>
        <div id="shotEditor" class="emptyState">选择已有分镜的项目</div>
      </section>

      <section class="band gate" id="heroGate">
        <div class="sectionHead">
          <h2>闸门② 关键帧确认</h2>
          <span id="heroGateState"></span>
        </div>
        <div id="heroEditor" class="emptyState">等待关键帧闸门项目</div>
      </section>

      <section class="band" id="productionNode">
        <div class="sectionHead">
          <h2>单镜生产节点</h2>
          <span id="productionNodeState"></span>
        </div>
        <div id="productionPanel" class="emptyState">等待分镜</div>
      </section>

      <section class="band" id="composeNode">
        <div class="sectionHead">
          <h2>合成节点</h2>
          <span>目标成片 30 秒</span>
        </div>
        <div id="composePanel" class="emptyState">等待成功镜头</div>
      </section>

      <section class="band" id="deliveryNode">
        <div class="sectionHead">
          <h2>交付区</h2>
          <span id="deliveryState"></span>
        </div>
        <div id="deliveryPanel" class="emptyState">暂无可交付项目</div>
      </section>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="/static/app.js?v=20260714-3"></script>
  </body>
</html>
