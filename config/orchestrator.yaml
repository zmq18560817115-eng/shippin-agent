server:
  host: "127.0.0.1"
  port: 8790

database:
  path: "db/agentflow.db"
  pragmas:
    journal_mode: "WAL"
    foreign_keys: "ON"
    busy_timeout_ms: 5000

runtime:
  media_concurrency: 1
  lease_seconds: 60
  worker_poll_interval_s: 1.0
  budget_mode: "observe"

pricing:
  # Sourced from public Volcengine Ark pricing pages (checked 2026-07-13):
  # doubao-seed-1.8 chat: ~0.8 CNY / 1M input tokens, ~8 CNY / 1M output tokens (16k tier).
  # doubao-seedance-2-0-fast: flat per-shot estimate at ~5s/shot, fast tier.
  # These are placeholders pending real invoices from block4/block8 live-key runs;
  # calibrate against actual billing per scripts/accept/report_10videos.md.
  doubao_analyze:
    input_cny_per_1k_tokens: 0.0008
    output_cny_per_1k_tokens: 0.008
  doubao_script:
    input_cny_per_1k_tokens: 0.0008
    output_cny_per_1k_tokens: 0.008
  doubao_shotplan:
    input_cny_per_1k_tokens: 0.0008
    output_cny_per_1k_tokens: 0.008
  doubao_review:
    input_cny_per_1k_tokens: 0.0008
    output_cny_per_1k_tokens: 0.008
  seedance_shot: 3.0
  ffmpeg_compose: 0.0
